name: Wake dealer tracking bot

on:
  schedule:
    # Singapore time: 12:25, 12:55, 13:10, 19:55 and 20:10.
    - cron: "25 4 * * *"
    - cron: "55 4 * * *"
    - cron: "10 5 * * *"
    - cron: "55 11 * * *"
    - cron: "10 12 * * *"
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render service
        run: curl --fail --retry 3 --retry-delay 10 --max-time 90 https://dealer-tracker.onrender.com/
